name: pingme
description: "Real-time peer-to-peer chat app over WiFi"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Theme
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  
  # State Management
  provider: ^6.1.2
  
  # Network & Connectivity
  connectivity_plus: ^6.0.5
  network_info_plus: ^6.0.0
  permission_handler: ^11.3.1
  
  # Local Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  
  # Socket & P2P Communication
  socket_io_client: ^2.0.3+1
  web_socket_channel: ^3.0.1
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  crypto: ^3.0.5
  collection: ^1.18.0
  
  # Media & Files
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  cached_network_image: ^3.4.1
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Device Info
  device_info_plus: ^10.1.2
  
  # Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0
  
  # QR Code for device pairing
  qr_flutter: ^4.1.0
  
  # Audio/Video calls (for future) - TEMPORARILY DISABLED
  # agora_rtc_engine: ^6.3.2
  
  # Authentication
  google_sign_in: ^6.2.1
  
  # mDNS / Network Discovery
  multicast_dns: ^0.3.2+6
  bonsoir: ^5.1.11
  
  # Encryption
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# 👇 THIS MUST BE OUTSIDE dependencies & dev_dependencies
flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo3.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/logo3.png
