name: Deploy Legal Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site bundle
        run: |
          set -euo pipefail
          pwd
          ls -la
          ls -la pingme || true

          mkdir -p _site

          PRIVACY_SRC=""
          TERMS_SRC=""
          for p in privacy_policy.html pingme/privacy_policy.html; do
            if [ -f "$p" ]; then PRIVACY_SRC="$p"; break; fi
          done
          for p in terms_of_service.html pingme/terms_of_service.html; do
            if [ -f "$p" ]; then TERMS_SRC="$p"; break; fi
          done

          if [ -z "$PRIVACY_SRC" ] || [ -z "$TERMS_SRC" ]; then
            echo "Required legal files were not found."
            echo "Detected PRIVACY_SRC='$PRIVACY_SRC' TERMS_SRC='$TERMS_SRC'"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          cp "$PRIVACY_SRC" _site/privacy_policy.html
          cp "$TERMS_SRC" _site/terms_of_service.html

          if [ -f index.html ]; then cp index.html _site/index.html; fi
          if [ -f pingme/index.html ] && [ ! -f _site/index.html ]; then cp pingme/index.html _site/index.html; fi
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'EOF'
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>PingMe Legal</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.5; }
                a { color: #0b57d0; }
              </style>
            </head>
            <body>
              <h1>PingMe Legal Pages</h1>
              <ul>
                <li><a href="./privacy_policy.html">Privacy Policy</a></li>
                <li><a href="./terms_of_service.html">Terms of Service</a></li>
              </ul>
            </body>
            </html>
            EOF
          fi
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
